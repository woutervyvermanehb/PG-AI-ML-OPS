name: Application CI/CD

# Controls when the workflow will run
on:
  # Triggers on pull requests to "main" that touch the course-04 application code
  pull_request:
    branches: [ "main" ]
    paths:
      - 'mlops-course-04/src/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  retrain-build-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlops-course-04/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Pull latest data with DVC
        run: dvc pull

      - name: Retrain model
        run: |
          mkdir -p models/
          python main.py

      - name: Log in, build, tag, and push image to Amazon ECR
        env:
          REGISTRY: 774118824883.dkr.ecr.eu-west-1.amazonaws.com
          REPOSITORY: ecr-mlops-course-ehb-repository-dev
          IMAGE_TAG: latest
        run: |
          # Log in to ECR directly via the AWS CLI, retrying on transient network timeouts
          for i in 1 2 3 4 5; do
            aws ecr get-login-password --region eu-west-1 \
              | docker login --username AWS --password-stdin "$REGISTRY" && break
            echo "ECR login attempt $i failed; retrying in 10s..."; sleep 10
          done
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
